name: Coverage

on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov
        pip install --user cpp-coveralls
    
    - name: Configure with coverage
      run: |
        rm -rf build
        cmake -B build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ctest
    
    - name: Collect coverage
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/test_*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      run: |
        coveralls --gcov-options '\-lp' --build-root build --exclude _deps --exclude test --exclude /usr/include || true
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
