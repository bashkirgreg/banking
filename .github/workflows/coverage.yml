name: Coverage

on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov
        pip install --user cpp-coveralls
    
    - name: Configure with coverage
      run: |
        cmake -B build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ctest
    
    - name: Collect coverage
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/test_account.cpp' '*/test_transaction.cpp' --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '*/CMakeFiles/*' '*/CompilerIdCXX/*' '*/CompilerIdC/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      run: |
        mkdir -p build/CMakeFiles/3.31.6/CompilerIdCXX build/CMakeFiles/3.31.6/CompilerIdC
        touch build/CMakeFiles/3.31.6/CompilerIdCXX/CMakeCXXCompilerId.cpp
        touch build/CMakeFiles/3.31.6/CompilerIdC/CMakeCCompilerId.c
        touch build/CMakeCXXCompilerId.cpp
        touch build/CMakeCCompilerId.c
        coveralls --gcov-options '\-lp' --build-root build --exclude _deps --exclude test --exclude /usr/include
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
