name: Coverage

on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov
        pip install --user gcovr
    
    - name: Configure with coverage
      run: |
        rm -rf build
        cmake -B build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ctest
    
    - name: Upload to Coveralls
      run: |
        gcovr --root . --build-directory build --exclude '_deps' --exclude 'test_' --exclude '/usr' --gcov-ignore-parse-errors --print-summary
        gcovr --root . --build-directory build --exclude '_deps' --exclude 'test_' --exclude '/usr' --gcov-ignore-parse-errors --coveralls-json --output coverage.json
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
